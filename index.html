<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAV 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:#130a0f;--surface2:#1e0f17;
  --border:#3d1a2e;--border2:#5c2442;
  --text:#f0d0e0;--text2:#a06080;--text3:#6b3a52;
  --accent:#ff2d78;--accent-dim:rgba(255,45,120,0.15);--accent-text:#fff;
  --danger:#ff4d4d;--danger-dim:rgba(255,77,77,0.1);
  --tg-bg:#2a0a1a;--tg-c:#ff6eb4;--tg-b:#7a1a4a;
  --ts-bg:#0a1a2a;--ts-c:#60b4ff;--ts-b:#1a4a7a;
  --ta-bg:#2a1a00;--ta-c:#ffb340;--ta-b:#7a4a00;
  --tc-bg:#1a0a14;--tc-c:#c06090;--tc-b:#4a1a34;
  --radius:6px;--radius-lg:10px;
  --mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif;
  --sidebar:210px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:13px;line-height:1.5;display:flex}

/* Sidebar */
.sidebar{width:var(--sidebar);min-height:100vh;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:10}
.logo{padding:18px 16px 14px;border-bottom:0.5px solid var(--border)}
.logo h1{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--accent);text-shadow:0 0 16px rgba(255,45,120,0.4)}
.logo p{font-size:10px;color:var(--text3);margin-top:2px}
.sb-stats{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;gap:7px}
.sst{display:flex;justify-content:space-between;align-items:center}
.sst-l{font-size:11px;color:var(--text3)}
.sst-n{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent)}
.sb-nav{padding:8px 6px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text2);width:100%;text-align:left;transition:all 0.12s;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);border:0.5px solid rgba(255,45,120,0.2)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.sb-actions{padding:10px 6px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:4px}

/* Main */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:44px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;background:var(--surface);flex-shrink:0;position:sticky;top:0;z-index:5}
.topbar-title{font-size:12px;font-weight:500;color:var(--text2);flex-shrink:0}
.tb-search{flex:1;max-width:320px}
.tb-search input{width:100%;padding:5px 10px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;font-family:var(--sans)}
.tb-search input:focus{outline:none;border-color:var(--accent)}
.tb-right{display:flex;gap:5px;margin-left:auto}
.tag-filter-bar{display:none;gap:6px;align-items:center;flex-wrap:wrap;padding:6px 18px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.content{padding:16px 18px;flex:1}
.panel{display:none}.panel.active{display:block}

/* Inputs */
input[type=text],textarea,select{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:12px;transition:border-color 0.15s}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)}
input[type=text]{padding:7px 10px;width:100%}
textarea{padding:9px 11px;width:100%;height:120px;resize:vertical;font-family:var(--mono);font-size:11px;line-height:1.7}
select{padding:5px 9px;cursor:pointer}

/* Buttons */
.btn{padding:5px 13px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:12px;font-family:var(--sans);font-weight:500;cursor:pointer;background:var(--surface2);color:var(--text);transition:all 0.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 10px rgba(255,45,120,0.3)}
.btn.primary:hover{opacity:0.88}
.btn.active-sort{background:var(--accent-dim);color:var(--accent);border-color:rgba(255,45,120,0.3)}
.btn.danger{color:var(--danger);border-color:transparent;background:none}
.btn.danger:hover{background:var(--danger-dim);border-color:var(--danger)}
.btn.sm{padding:3px 9px;font-size:11px}

/* Grid cards */
#list-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color 0.15s;display:flex;flex-direction:column}
.card:hover{border-color:var(--border2)}
.card-thumb{width:100%;height:130px;object-fit:cover;display:block;background:var(--surface2);cursor:pointer}
.card-thumb-ph{width:100%;height:130px;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--surface2);cursor:pointer;color:var(--text3);flex-direction:column;gap:4px}
.card-thumb-ph small{font-size:10px;color:var(--text3)}
.card-info{padding:8px 10px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-row1{display:flex;align-items:center;gap:6px;justify-content:space-between}
.card-tags{display:flex;gap:3px;flex-wrap:wrap}
.card-last-review{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-footer{border-top:0.5px solid var(--border);padding:5px 8px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.card-body{padding:10px 12px;border-top:0.5px solid var(--border);display:none}
.card-body.open{display:block;animation:slideDown 0.15s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* List mode (group/alpha) */
.list-mode #list-container{display:flex;flex-direction:column;gap:6px}
.list-mode .card{flex-direction:row;align-items:stretch;border-radius:var(--radius)}
.list-mode .card-thumb{width:52px;height:52px;flex-shrink:0;border-radius:0}
.list-mode .card-thumb-ph{width:52px;height:52px;flex-shrink:0;border-radius:0;font-size:16px}
.list-mode .card-info{flex-direction:row;align-items:center;padding:6px 10px;gap:10px}
.list-mode .card-row1{flex:1}
.list-mode .card-footer{border-top:none;border-left:0.5px solid var(--border);flex-shrink:0}
.list-mode .card-last-review{display:none}
.list-mode .card-body{border-top:none;border-left:0.5px solid var(--border)}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:99px;font-size:10px;font-weight:500;border:0.5px solid;flex-shrink:0}
.tag.genre{background:var(--tg-bg);color:var(--tg-c);border-color:var(--tg-b)}
.tag.studio{background:var(--ts-bg);color:var(--ts-c);border-color:var(--ts-b)}
.tag.star{background:var(--ta-bg);color:var(--ta-c);border-color:var(--ta-b)}
.tag.custom{background:var(--tc-bg);color:var(--tc-c);border-color:var(--tc-b)}
.tag-del{cursor:pointer;opacity:0.5;font-size:9px;line-height:1}
.tag-del:hover{opacity:1}

/* Code badge */
.code-badge{font-family:var(--mono);font-size:11px;font-weight:500;background:var(--accent-dim);color:var(--accent);border:0.5px solid rgba(255,45,120,0.25);border-radius:4px;padding:2px 7px;display:inline-block;white-space:nowrap;box-shadow:0 0 6px rgba(255,45,120,0.12)}

/* Count ctrl */
.count-ctrl{display:inline-flex;align-items:center;border:0.5px solid rgba(255,45,120,0.3);border-radius:99px;overflow:hidden;flex-shrink:0}
.cnt-btn{background:none;border:none;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;padding:1px 6px;transition:background 0.12s;line-height:1.4}
.cnt-btn:hover{background:var(--accent-dim)}
.cnt-btn.minus{border-right:0.5px solid rgba(255,45,120,0.2)}
.cnt-btn.plus{border-left:0.5px solid rgba(255,45,120,0.2)}
.cnt-num{font-family:var(--mono);font-size:11px;color:var(--accent);padding:1px 5px;min-width:20px;text-align:center}

/* Preset tags */
.preset-tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:500;border:0.5px solid;cursor:pointer;transition:all 0.1s;opacity:0.5;margin:2px}
.preset-tag:hover{opacity:1}
.preset-tag.genre{background:var(--tg-bg);color:var(--tg-c);border-color:var(--tg-b)}
.preset-tag.studio{background:var(--ts-bg);color:var(--ts-c);border-color:var(--ts-b)}
.preset-tag.star{background:var(--ta-bg);color:var(--ta-c);border-color:var(--ta-b)}
.preset-tag.custom{background:var(--tc-bg);color:var(--tc-c);border-color:var(--tc-b)}
.preset-tag.already{opacity:0.2;cursor:not-allowed}

/* Add tag row */
.add-tag-row{display:flex;gap:5px;align-items:center;margin-top:8px}
.add-tag-row input[type=text]{flex:1;padding:5px 8px}

/* Paste zone */
.paste-zone{border:1px dashed var(--border2);border-radius:var(--radius);padding:12px;text-align:center;font-size:11px;color:var(--text3);cursor:pointer;transition:all 0.15s;margin-bottom:8px}
.paste-zone:hover,.paste-zone.drag{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Image in card body */
.body-img-wrap{position:relative;margin-bottom:8px}
.body-img{width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius);border:0.5px solid var(--border);display:block}
.img-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.img-del:hover{background:var(--danger)}

/* Group/Alpha */
.group-section{margin-bottom:1.2rem}
.group-header{display:flex;align-items:center;gap:8px;padding:5px 0;margin-bottom:5px;border-bottom:0.5px solid var(--border)}
.group-label{font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3)}
.group-count{font-family:var(--mono);font-size:10px;color:var(--text3);margin-left:auto}
.alpha-bar{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.alpha-pill{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;background:var(--surface);border:0.5px solid var(--border);color:var(--text3);cursor:pointer;transition:all 0.1s}
.alpha-pill:hover{border-color:var(--accent);color:var(--accent)}
.alpha-anchor{display:flex;align-items:center;gap:8px;margin:10px 0 5px}
.alpha-anchor-label{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:500}
.alpha-anchor-line{flex:1;height:0.5px;background:var(--border)}

/* Tag filter chip */
.filter-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;border:0.5px solid;cursor:pointer;opacity:0.45;transition:all 0.12s}
.filter-chip:hover{opacity:0.8}
.filter-chip.on{opacity:1;box-shadow:0 0 5px rgba(255,45,120,0.3)}
.filter-chip.genre{background:var(--tg-bg);color:var(--tg-c);border-color:var(--tg-b)}
.filter-chip.studio{background:var(--ts-bg);color:var(--ts-c);border-color:var(--ts-b)}
.filter-chip.star{background:var(--ta-bg);color:var(--ta-c);border-color:var(--ta-b)}
.filter-chip.custom{background:var(--tc-bg);color:var(--tc-c);border-color:var(--tc-b)}

/* Reviews */
.review-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:11px 14px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.review-thumb{width:42px;height:42px;object-fit:cover;border-radius:var(--radius);border:0.5px solid var(--border);flex-shrink:0}
.review-thumb-ph{width:42px;height:42px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.review-body{flex:1;min-width:0}
.review-code{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:3px}
.review-text{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:4px}
.review-meta{font-size:10px;color:var(--text3);display:flex;gap:8px;align-items:center}
.review-del{cursor:pointer;color:var(--text3);font-size:10px}
.review-del:hover{color:var(--danger)}

/* Weekday */
.weekday-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:16px}
.weekday-col{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px 6px;text-align:center}
.weekday-name{font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
.weekday-name.sun{color:#ff6b6b}
.weekday-name.sat{color:#60b4ff}
.weekday-bar-wrap{height:80px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:6px}
.weekday-bar{width:24px;border-radius:3px 3px 0 0;background:var(--accent);min-height:2px;box-shadow:0 0 6px rgba(255,45,120,0.3)}
.weekday-count{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--accent);text-shadow:0 0 8px rgba(255,45,120,0.4)}
.weekday-pct{font-size:10px;color:var(--text3);margin-top:2px}

/* Ranking */
.rank-tabs{display:flex;gap:4px;margin-bottom:12px}
.rank-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:10px 14px;margin-bottom:6px;transition:border-color 0.15s}
.rank-card:hover{border-color:var(--border2)}
.rank-num{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text3);min-width:26px;text-align:center}
.rank-num.gold{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.4)}
.rank-num.silver{color:#c0c0c0}
.rank-num.bronze{color:#cd7f32}
.rank-info{flex:1;min-width:0}
.rank-code{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--accent)}
.rank-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.rank-count{font-family:var(--mono);font-size:20px;font-weight:500;color:var(--accent);text-align:right;text-shadow:0 0 10px rgba(255,45,120,0.4);line-height:1}
.rank-count-label{font-size:10px;color:var(--text3);text-align:right}
.rank-img{width:44px;height:44px;object-fit:cover;border-radius:var(--radius);border:0.5px solid var(--border);flex-shrink:0}
.rank-bar{height:2px;background:var(--border);border-radius:99px;margin-top:5px;overflow:hidden}
.rank-bar-fill{height:100%;background:var(--accent);border-radius:99px;box-shadow:0 0 5px rgba(255,45,120,0.5)}
.count-reset{font-size:10px;color:var(--text3);cursor:pointer;margin-left:4px}
.count-reset:hover{color:var(--danger)}

/* Tag manage */
.tag-manage-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tag-manage-sec{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px}
.tag-manage-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.3px}
.preset-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;min-height:22px}
.preset-item{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:500;border:0.5px solid}
.preset-item.genre{background:var(--tg-bg);color:var(--tg-c);border-color:var(--tg-b)}
.preset-item.studio{background:var(--ts-bg);color:var(--ts-c);border-color:var(--ts-b)}
.preset-item.star{background:var(--ta-bg);color:var(--ta-c);border-color:var(--ta-b)}
.preset-item.custom{background:var(--tc-bg);color:var(--tc-c);border-color:var(--tc-b)}
.preset-item .del{cursor:pointer;opacity:0.5;font-size:9px}
.preset-item .del:hover{opacity:1}
.preset-add-row{display:flex;gap:5px}
.preset-add-row input{flex:1;padding:5px 8px}

/* Form panels */
.form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;max-width:500px}
.form-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:10px}
.hint{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.7}
.input-row{display:flex;gap:7px;margin-bottom:8px}
.input-row input{flex:1}
.import-preview{margin-top:7px;font-family:var(--mono);font-size:10px;color:var(--accent);min-height:14px}

/* Empty */
.empty{text-align:center;padding:50px 1rem;color:var(--text3)}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:0.3}
.empty p{font-size:12px}

/* Toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:7px 16px;border-radius:99px;font-size:12px;opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Delete modal */
#del-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center}
#del-modal.show{display:flex}
.modal-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:22px;min-width:260px;max-width:320px}
.modal-box h3{font-size:13px;font-weight:500;margin-bottom:7px}
.modal-box p{font-size:12px;color:var(--text2);margin-bottom:16px}
.modal-btns{display:flex;gap:7px;justify-content:flex-end}

/* Review modal */
#review-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center}
#review-modal.show{display:flex}
.review-modal-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:22px;width:340px}
.review-modal-box h3{font-size:13px;font-weight:500;margin-bottom:4px}
.review-modal-code{font-family:var(--mono);font-size:11px;color:var(--accent);margin-bottom:12px}
.review-modal-input{width:100%;padding:8px 10px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--sans);margin-bottom:10px}
.review-modal-input:focus{outline:none;border-color:var(--accent)}
.review-modal-btns{display:flex;gap:7px;justify-content:flex-end}

/* Lock */
#lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
#lock.hidden{display:none}
.lock-box{width:290px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:28px 22px;text-align:center;box-shadow:0 0 40px rgba(255,45,120,0.12)}
.lock-icon{font-size:26px;margin-bottom:12px;opacity:0.6}
.lock-title{font-family:var(--mono);font-size:15px;color:var(--accent);margin-bottom:3px;text-shadow:0 0 14px rgba(255,45,120,0.5)}
.lock-sub{font-size:11px;color:var(--text3);margin-bottom:16px}
.lock-pw{width:100%;padding:9px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:15px;font-family:var(--mono);text-align:center;letter-spacing:3px;margin-bottom:10px}
.lock-pw:focus{outline:none;border-color:var(--accent)}
.lock-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;box-shadow:0 0 16px rgba(255,45,120,0.35)}
.lock-btn:hover{opacity:0.88}
.lock-err{font-size:11px;color:var(--danger);margin-top:7px;min-height:15px}
.lock-shake{animation:shake 0.35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}

<script>
const PASSWORD = '1234'; // ★ 비밀번호 변경 ★
const SUPABASE_URL = 'https://vdxzekdhcuabqyimwewg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_47gE09l4GYC9uG2euG4w1w_Re8eyDB5';

const TAG_TYPES = [
  {value:'genre',label:'장르'},{value:'studio',label:'제작사'},
  {value:'star',label:'출연자'},{value:'custom',label:'기타'},
];
const DAYS=['일','월','화','수','목','금','토'];
const DAY_ORDER=[1,2,3,4,5,6,0];

// ── Supabase REST API helpers ──
async function sbGet(table, params='') {
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+params, {
    headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, data) {
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table, {
    method:'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify(data)
  });
  if(!r.ok) {
    const err = await r.text();
    console.error('sbUpsert error:', err);
    throw new Error(err);
  }
}

// PATCH update (count/weekdays 같은 특정 필드만 업데이트)
async function sbPatch(table, col, val, data) {
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+col+'=eq.'+encodeURIComponent(val), {
    method:'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if(!r.ok) {
    const err = await r.text();
    console.error('sbPatch error:', err);
    throw new Error(err);
  }
}
async function sbDelete(table, col, val) {
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+table+'?'+col+'=eq.'+encodeURIComponent(val), {
    method:'DELETE',
    headers: {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  if(!r.ok) throw new Error(await r.text());
}

// ── State ──
let db=[], presets={}, imgCache={};
let sortAlpha=false, groupMode=false, activeFilters=new Set(), _reviewCode=null;
let _saving=false;
TAG_TYPES.forEach(t=>{presets[t.value]=[];});

// ── Load all data from Supabase ──
async function loadAll() {
  try {
    // items
    const items = await sbGet('items','select=*&order=created_at.asc');
    db = items.map(r=>({
      code: r.code,
      tags: r.tags||[],
      count: r.count||0,
      weekdays: r.weekdays||[0,0,0,0,0,0,0],
      reviews: r.reviews||[],
      open: false,
    }));
    // images
    const imgs = await sbGet('images','select=code,data_url');
    imgs.forEach(r=>{ imgCache[r.code]=r.data_url; });
    // presets
    const pres = await sbGet('presets','select=*');
    TAG_TYPES.forEach(t=>{ presets[t.value]=[]; });
    pres.forEach(r=>{ presets[r.type]=r.values||[]; });
  } catch(e) {
    console.error('loadAll error:', e);
  }
}

// ── Save item to Supabase ──
async function saveItem(code) {
  const item = db.find(x=>x.code===code);
  if(!item) return;
  try {
    // PATCH로 업데이트 시도, 없으면 INSERT
    await sbPatch('items', 'code', code, {
      tags: item.tags,
      count: item.count,
      weekdays: item.weekdays,
      reviews: item.reviews,
    });
  } catch(e) {
    // PATCH 실패시 upsert 시도
    try {
      await sbUpsert('items', {
        code: item.code,
        tags: item.tags,
        count: item.count,
        weekdays: item.weekdays,
        reviews: item.reviews,
      });
    } catch(e2) { console.error('saveItem error:', e2); }
  }
}

// ── Save presets ──
async function savePresets() {
  try {
    const rows = TAG_TYPES.map(t=>({type:t.value, values:presets[t.value]}));
    await sbUpsert('presets', rows);
  } catch(e) { console.error('savePresets error:', e); }
}

// ── Toast ──
function toast(msg) {
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

// ── Stats ──
function updateStats() {
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  s('stat-total',db.length);
  s('stat-tags',db.reduce((a,x)=>a+x.tags.length,0));
  s('stat-genres',db.reduce((a,x)=>a+x.tags.filter(t=>t.type==='genre').length,0));
}

// ── Lock ──
function checkPw() {
  const val=document.getElementById('lock-pw').value;
  if(val===PASSWORD) {
    try{sessionStorage.setItem('jav_auth','1');}catch(e){}
    unlockApp();
  } else {
    const box=document.querySelector('.lock-box');
    document.getElementById('lock-err').textContent='비밀번호가 틀렸습니다';
    box.classList.remove('lock-shake');void box.offsetWidth;box.classList.add('lock-shake');
    document.getElementById('lock-pw').value='';
    document.getElementById('lock-pw').focus();
  }
}
async function unlockApp() {
  document.getElementById('lock').classList.add('hidden');
  document.getElementById('loading').style.display='flex';
  await loadAll();
  document.getElementById('loading').style.display='none';
  renderList();updateStats();
}

// ── Delete modal ──
function confirmDelete(msg,cb) {
  document.getElementById('del-msg').textContent=msg;
  document.getElementById('del-confirm').onclick=()=>{closeDelModal();cb();};
  document.getElementById('del-modal').classList.add('show');
}
function closeDelModal(){document.getElementById('del-modal').classList.remove('show');}
document.getElementById('del-modal').addEventListener('click',e=>{if(e.target===document.getElementById('del-modal'))closeDelModal();});

// ── Review modal ──
function showReviewModal(code) {
  _reviewCode=code;
  const el=document.getElementById('review-modal-code');
  const inp=document.getElementById('review-input');
  const modal=document.getElementById('review-modal');
  if(!el||!inp||!modal)return;
  el.textContent=code;inp.value='';
  modal.classList.add('show');
  setTimeout(()=>inp.focus(),150);
}
function closeReviewModal(){document.getElementById('review-modal').classList.remove('show');_reviewCode=null;}
async function submitReview() {
  const inp=document.getElementById('review-input');if(!inp)return;
  const text=inp.value.trim();
  if(_reviewCode) {
    const item=db.find(x=>x.code===_reviewCode);
    if(item) {
      if(!item.reviews)item.reviews=[];
      if(text)item.reviews.push({text,date:new Date().toISOString(),day:new Date().getDay()});
      await saveItem(_reviewCode);
      renderList();renderReviews();
    }
  }
  closeReviewModal();
  toast(text?'한줄평 저장됨':'건너뜀');
}
document.getElementById('review-modal').addEventListener('click',e=>{if(e.target===document.getElementById('review-modal'))closeReviewModal();});

// ── Utils ──
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'');}
function parseCodes(text){
  const tokens=text.split(/[\n,\r\t ]+/).map(t=>t.trim()).filter(t=>t.length>1);
  return[...new Set(tokens.map(norm).filter(c=>c.length>1&&/[a-z]/.test(c)&&/[0-9]/.test(c)))];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── CRUD ──
async function addCodes(codes) {
  let added=0;
  for(const c of codes) {
    if(!db.find(x=>x.code===c)) {
      const item={code:c,tags:[],open:false,count:0,weekdays:[0,0,0,0,0,0,0],reviews:[]};
      db.push(item);added++;
      // 새 아이템은 upsert (INSERT)
      try {
        await sbUpsert('items', {
          code:c, tags:[], count:0,
          weekdays:[0,0,0,0,0,0,0], reviews:[]
        });
      } catch(e) { console.error('addCodes error:', e); }
    }
  }
  updateStats();return added;
}
async function addSingle() {
  const inp=document.getElementById('new-code');
  const c=norm(inp.value);
  if(!c||c.length<2){toast('올바른 품번을 입력하세요');return;}
  if(db.find(x=>x.code===c)){toast('이미 존재하는 품번입니다');return;}
  toast('저장 중...');
  await addCodes([c]);
  toast("'"+c+"' 추가됨");inp.value='';renderList();switchTab('list');
}
async function importBulk() {
  const codes=parseCodes(document.getElementById('import-text').value);
  if(!codes.length){toast('인식된 품번이 없습니다');return;}
  toast('저장 중...');
  const n=await addCodes(codes);
  renderList();
  toast(n+'개 추가됨 (중복 '+(codes.length-n)+'개 제외)');
  document.getElementById('import-text').value='';

async function changeCount(code,delta) {
  const item=db.find(x=>x.code===code);if(!item)return;
  const day=new Date().getDay();
  if(!item.weekdays)item.weekdays=[0,0,0,0,0,0,0];
  if(delta>0){

// ── Image ──
function compressImg(dataUrl,cb){
  const img=new Image();
  img.onload=()=>{
    const MAX=500;let w=img.width,h=img.height;
    if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.78));
  };
  img.src=dataUrl;
}
async function saveImg(code,dataUrl){
  compressImg(dataUrl,async compressed=>{
    imgCache[code]=compressed;
    try{
      await sbUpsert('images',{code,data_url:compressed});
    }catch(e){console.error('saveImg error:',e);}
    renderList();
    const kb=Math.round(compressed.length*0.75/1024);
    toast('사진 저장됨 ('+kb+'KB)');
  });
}
async function removeImg(code){
  delete imgCache[code];
  try{await sbDelete('images','code',code);}catch(e){}
  renderList();toast('사진 삭제됨');
}
function handleFile(e,code){
  const file=e.target.files[0];if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();r.onload=ev=>saveImg(code,ev.target.result);r.readAsDataURL(file);
}
function handleDrop(e,code){
  e.preventDefault();
  const el=document.getElementById('pz-'+code);if(el)el.classList.remove('drag');
  const file=e.dataTransfer.files[0];if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();r.onload=ev=>saveImg(code,ev.target.result);r.readAsDataURL(file);
}
document.addEventListener('paste',e=>{
  const imgItem=[...e.clipboardData.items].find(i=>i.type.startsWith('image/'));
  if(!imgItem)return;
  const openCard=db.find(x=>x.open);
  if(!openCard){toast('먼저 품번 카드를 열어주세요 (▼ 편집)');return;}
  const r=new FileReader();r.onload=ev=>saveImg(openCard.code,ev.target.result);r.readAsDataURL(imgItem.getAsFile());
});

  if(!items.length){
    panel.classList.remove('list-mode');
    el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>'+(q?'검색 결과가 없습니다':'저장된 품번이 없습니다')+'</p></div>';
    return;
  }
  if(groupMode){
    panel.classList.add('list-mode');
    if(activeFilters.size>0)items=items.filter(x=>x.tags.some(t=>activeFilters.has(t.type+'::'+t.value)));
    const tagMap={},noTag=[];
    items.forEach(item=>{
      if(!item.tags.length){noTag.push(item);return;}
      item.tags.forEach(t=>{
        const key=t.type+'::'+t.value;
        if(!tagMap[key])tagMap[key]={type:t.type,value:t.value,items:[]};
        if(!tagMap[key].items.find(x=>x.code===item.code))tagMap[key].items.push(item);
      });
    });
    const to={genre:0,studio:1,star:2,custom:3};
    const groups=Object.values(tagMap).sort((a,b)=>{const td=to[a.type]-to[b.type];return td!==0?td:a.value.localeCompare(b.value);});
    let html='';
    groups.forEach(g=>{
      const label=TAG_TYPES.find(t=>t.value===g.type)?.label||g.type;
      const sorted=[...g.items].sort((a,b)=>a.code.localeCompare(b.code));
      html+='<div class="group-section"><div class="group-header"><span class="tag '+g.type+'" style="pointer-events:none">'+esc(g.value)+'</span><span class="group-label">'+label+'</span><span class="group-count">'+sorted.length+'개</span></div>'+sorted.map(cardHtml).join('')+'</div>';
    });
    if(noTag.length)html+='<div class="group-section"><div class="group-header"><span class="group-label">태그 없음</span><span class="group-count">'+noTag.length+'개</span></div>'+noTag.map(cardHtml).join('')+'</div>';
    el.innerHTML=html;return;
  }
  if(sortAlpha){
    panel.classList.add('list-mode');
    items.sort((a,b)=>a.code.localeCompare(b.code));
    const alphaMap={};
    items.forEach(item=>{const l=item.code[0].toUpperCase();if(!alphaMap[l])alphaMap[l]=[];alphaMap[l].push(item);});
    const letters=Object.keys(alphaMap).sort();
    const bar='<div class="alpha-bar">'+letters.map(l=>'<span class="alpha-pill" onclick="document.getElementById(\'a-'+l+'\').scrollIntoView({behavior:\'smooth\'})">'+l+'</span>').join('')+'</div>';
    const secs=letters.map(l=>'<div id="a-'+l+'"><div class="alpha-anchor"><span class="alpha-anchor-label">'+l+'</span><span class="alpha-anchor-line"></span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">'+alphaMap[l].length+'개</span></div>'+alphaMap[l].map(cardHtml).join('')+'</div>').join('');
    el.innerHTML=bar+secs;return;
  }
  panel.classList.remove('list-mode');
  el.innerHTML=items.map(cardHtml).join('');
}

// ── Export/Import (JSON 백업) ──
async function exportJSON(){
  if(!db.length){toast('내보낼 데이터가 없습니다');return;}
  toast('백업 준비 중...');
  const images=Object.entries(imgCache).map(([code,dataUrl])=>({code,dataUrl}));
  const data={version:4,exported:new Date().toISOString(),presets,db,images};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='jav_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('JSON 백업 완료 ✅');
}
async function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  toast('복원 중...');
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.db||!Array.isArray(data.db))throw new Error();
      let added=0;
      for(const item of data.db){
        if(!db.find(x=>x.code===item.code)){db.push(item);await saveItem(item.code);added++;}
      }
      if(data.images){
        for(const r of data.images){
          imgCache[r.code]=r.dataUrl;
          await sbUpsert('images',{code:r.code,data_url:r.dataUrl});
        }
      }
      if(data.presets){
        TAG_TYPES.forEach(t=>{if(data.presets[t.value])presets[t.value]=[...new Set([...(presets[t.value]||[]),...data.presets[t.value]])];});
        await savePresets();
      }
      updateStats();renderList();
      toast('복원 완료: '+added+'개 추가 ✅');
    }catch(err){console.error(err);toast('JSON 파일 형식 오류');}
    e.target.value='';
  };
  reader.readAsText(file);
}
function exportTxt(){
  if(!db.length){toast('내보낼 데이터가 없습니다');return;}
  const lines=db.map(x=>{
    const tags=x.tags.map(t=>'['+(TAG_TYPES.find(tt=>tt.value===t.type)?.label||t.type)+':'+t.value+']').join(' ');
    return x.code+(tags?'  '+tags:'');
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='품번목록.txt';a.click();
  toast('txt 내보내기 완료');
}

// ── View toggle ──
function setView(mode){
  const body=document.body;
  const btnPc=document.getElementById('vt-pc');
  const btnMobile=document.getElementById('vt-mobile');
  if(mode==='mobile'){
    body.classList.add('mobile-view');
    if(btnPc)btnPc.classList.remove('active');
    if(btnMobile)btnMobile.classList.add('active');
    try{localStorage.setItem('jav_view','mobile');}catch(e){}
  } else {
    body.classList.remove('mobile-view');
    if(btnPc)btnPc.classList.add('active');
    if(btnMobile)btnMobile.classList.remove('active');
    try{localStorage.setItem('jav_view','pc');}catch(e){}
  }
}

// ── Tab switch ──
function switchTab(name){
  const names=['list','add','import','presets','ranking','reviews','weekday'];
  names.forEach(n=>{
    const el=document.getElementById('nav-'+n);if(el)el.classList.toggle('active',n===name);
    const mel=document.getElementById('mnav-'+n);if(mel)mel.classList.toggle('active',n===name);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  const titles={list:'목록',add:'품번 추가',import:'메모장 불러오기',presets:'태그 관리',ranking:'순위',reviews:'한줄평',weekday:'요일 통계'};
  const t=document.getElementById('topbar-title');if(t)t.textContent=titles[name]||'';
  const showSearch=name==='list';
  const ts=document.getElementById('tb-search');if(ts)ts.style.display=showSearch?'':'none';
  const tr=document.getElementById('tb-right');if(tr)tr.style.display=showSearch?'':'none';
  {const vte=document.getElementById('view-toggle');if(vte)vte.style.display='flex';}
  if(!showSearch)hideFilterBar();
  if(name==='add')setTimeout(()=>document.getElementById('new-code').focus(),50);
  if(name==='presets')renderPresets();
  if(name==='ranking'){renderRanking();document.getElementById('rank-container').style.display='block';document.getElementById('actor-container').style.display='none';document.getElementById('rank-tab-code').classList.add('active-sort');document.getElementById('rank-tab-actor').classList.remove('active-sort');}
  if(name==='reviews')renderReviews();
  if(name==='weekday')renderWeekday();
}

// ── Init ──
(function(){
  // 저장된 뷰 설정 복원 또는 모바일 자동 감지
  let savedView='pc';
  try{savedView=localStorage.getItem('jav_view')||'pc';}catch(e){}
  if(savedView==='mobile'||window.innerWidth<=768){
    setView('mobile');
  }

  let authed=false;
  try{authed=sessionStorage.getItem('jav_auth')==='1';}catch(e){}
  if(authed){
    unlockApp();
  } else {
    setTimeout(()=>{const pw=document.getElementById('lock-pw');if(pw)pw.focus();},100);
  }
})();
</script>
